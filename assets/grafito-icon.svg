<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente de fondo estilo GNOME -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3584e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c71d8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente para la curva -->
    <linearGradient id="curveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f6d32d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f9f06b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f6d32d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra suave -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGradient)" filter="url(#softShadow)"/>
  
  <!-- Cuadrícula sutil -->
  <g opacity="0.15" stroke="#ffffff" stroke-width="2" fill="none">
    <line x1="128" y1="96" x2="128" y2="416"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="384" y1="96" x2="384" y2="416"/>
    <line x1="96" y1="128" x2="416" y2="128"/>
    <line x1="96" y1="256" x2="416" y2="256"/>
    <line x1="96" y1="384" x2="416" y2="384"/>
  </g>
  
  <!-- Ejes principales -->
  <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="96" y1="256" x2="416" y2="256"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
  </g>
  
  <!-- Flechas de ejes -->
  <g fill="#ffffff" opacity="0.6">
    <polygon points="416,256 400,248 400,264"/>
    <polygon points="256,96 248,112 264,112"/>
  </g>
  
  <!-- Curva de función (sin(x) estilizada) -->
  <path d="M 96 256 
           C 128 256, 144 180, 176 180
           C 208 180, 224 332, 256 332
           C 288 332, 304 180, 336 180
           C 368 180, 384 256, 416 256"
        fill="none" 
        stroke="url(#curveGradient)" 
        stroke-width="12" 
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>
  
  <!-- Punto destacado en la curva -->
  <circle cx="256" cy="332" r="16" fill="#f9f06b" stroke="#ffffff" stroke-width="4" filter="url(#softShadow)"/>
  
  <!-- Punto secundario -->
  <circle cx="176" cy="180" r="12" fill="#f9f06b" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  
  <!-- Punto terciario -->
  <circle cx="336" cy="180" r="12" fill="#f9f06b" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
</svg>
